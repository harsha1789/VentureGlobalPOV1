<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#143a6b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1920" height="8" fill="#f7a823"/>

  <!-- Title -->
  <text x="120" y="120" font-size="56" font-weight="700" fill="#ffffff">Document Control Automation — ROI Snapshot</text>
  <text x="120" y="170" font-size="26" font-weight="400" fill="#a8c4e8">VG CP2 LNG  •  HxGN SDx Bot  •  Peak Construction Phase</text>

  <!-- ── Headline metric ── -->
  <rect x="120" y="220" width="1680" height="160" rx="12" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="160" y="285" font-size="28" font-weight="600" fill="#0b1f3a">Headline</text>
  <text x="160" y="345" font-size="44" font-weight="700" fill="#143a6b">
    <tspan fill="#0b1f3a">From </tspan>
    <tspan fill="#c0392b">15–25 min</tspan>
    <tspan fill="#0b1f3a"> per submittal </tspan>
    <tspan fill="#0b1f3a">→ </tspan>
    <tspan fill="#1e8449">~3 seconds</tspan>
    <tspan fill="#0b1f3a">.   22 automated checks vs. 5–8 manual.</tspan>
  </text>

  <!-- ── Three KPI cards ── -->
  <!-- Card 1: Hours saved -->
  <rect x="120" y="420" width="540" height="280" rx="12" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="120" y="420" width="540" height="8" rx="4" fill="#1e8449"/>
  <text x="160" y="490" font-size="24" font-weight="600" fill="#5a6b80">DC HOURS SAVED / WEEK</text>
  <text x="160" y="595" font-size="110" font-weight="800" fill="#1e8449">80–100</text>
  <text x="160" y="650" font-size="22" fill="#5a6b80">at 300 submittals/week</text>
  <text x="160" y="680" font-size="22" fill="#5a6b80">peak construction phase</text>

  <!-- Card 2: Throughput -->
  <rect x="690" y="420" width="540" height="280" rx="12" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="690" y="420" width="540" height="8" rx="4" fill="#2874a6"/>
  <text x="730" y="490" font-size="24" font-weight="600" fill="#5a6b80">THROUGHPUT</text>
  <text x="730" y="595" font-size="110" font-weight="800" fill="#2874a6">400+</text>
  <text x="730" y="650" font-size="22" fill="#5a6b80">submittals processed</text>
  <text x="730" y="680" font-size="22" fill="#5a6b80">in under 30 minutes</text>

  <!-- Card 3: Review time reduction -->
  <rect x="1260" y="420" width="540" height="280" rx="12" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="1260" y="420" width="540" height="8" rx="4" fill="#f7a823"/>
  <text x="1300" y="490" font-size="24" font-weight="600" fill="#5a6b80">REVIEW TIME REDUCTION</text>
  <text x="1300" y="595" font-size="110" font-weight="800" fill="#d68910">70–85%</text>
  <text x="1300" y="650" font-size="22" fill="#5a6b80">bot pre-screens; humans</text>
  <text x="1300" y="680" font-size="22" fill="#5a6b80">handle exceptions only</text>

  <!-- ── Comparison strip ── -->
  <rect x="120" y="740" width="1680" height="200" rx="12" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="160" y="795" font-size="26" font-weight="600" fill="#0b1f3a">Manual vs. Automated</text>

  <!-- Header row -->
  <text x="160"  y="845" font-size="20" font-weight="600" fill="#5a6b80">Metric</text>
  <text x="780"  y="845" font-size="20" font-weight="600" fill="#5a6b80">Manual Process</text>
  <text x="1280" y="845" font-size="20" font-weight="600" fill="#5a6b80">With Automation</text>

  <line x1="160" y1="858" x2="1760" y2="858" stroke="#dde4ee" stroke-width="2"/>

  <!-- Row 1 -->
  <text x="160"  y="890" font-size="22" fill="#0b1f3a">Time per submittal</text>
  <text x="780"  y="890" font-size="22" fill="#c0392b" font-weight="600">15–25 minutes</text>
  <text x="1280" y="890" font-size="22" fill="#1e8449" font-weight="600">~3 seconds</text>

  <!-- Row 2 -->
  <text x="160"  y="922" font-size="22" fill="#0b1f3a">Checks per document</text>
  <text x="780"  y="922" font-size="22" fill="#c0392b" font-weight="600">5–8 spot checks</text>
  <text x="1280" y="922" font-size="22" fill="#1e8449" font-weight="600">22 automated, every time</text>

  <!-- Footer -->
  <rect x="0" y="1010" width="1920" height="70" fill="#0a172d"/>
  <text x="120" y="1055" font-size="22" fill="#a8c4e8">
    Bot stops at "Bot Reviewed" — final Complete remains a human decision.  Governance preserved.
  </text>
  <text x="1700" y="1055" font-size="20" fill="#5a7da8">VG CP2 • DC Automation</text>
</svg>
