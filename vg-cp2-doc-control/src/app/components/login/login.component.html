<div class="login-screen">
  <div class="login-bg-pattern"></div>

  <div class="login-wrap">
    <div class="login-logo-block">
      <div class="login-logo-icon">
        <svg viewBox="0 0 40 40" fill="none">
          <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="#1e3a5f" stroke="#fff" stroke-width="1"/>
          <polygon points="20,8 30,14 30,26 20,32 10,26 10,14" fill="#2a5a8f" stroke="rgba(255,255,255,.3)" stroke-width="0.5"/>
          <polygon points="20,14 24,17 24,23 20,26 16,23 16,17" fill="#4da6ff" opacity="0.6"/>
        </svg>
      </div>
      <h1 class="login-title">VG CP2 LNG</h1>
      <p class="login-subtitle">SDx Document Control System</p>
    </div>

    <div class="login-card">
      <div class="login-error" [class.show]="errorMsg()">
        {{ errorMsg() }}
      </div>

      <div class="login-field">
        <label class="login-label" for="username">Username</label>
        <input
          id="username"
          class="login-input"
          type="text"
          placeholder="Enter username"
          autocomplete="username"
          [(ngModel)]="username"
          (keydown)="onKeydown($event)"
        />
      </div>

      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <input
          id="password"
          class="login-input"
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
          [(ngModel)]="password"
          (keydown)="onKeydown($event)"
        />
      </div>

      <div class="cred-hint">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="0.8"/>
          <path d="M5 4.5v2.5M5 3v.5" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
        </svg>
        Demo credentials:
        <span class="cred-val">harsha</span> /
        <span class="cred-val">test</span>
      </div>

      <button
        class="login-btn"
        [disabled]="loading()"
        (click)="onSubmit()"
      >
        <span *ngIf="!loading()">Sign In</span>
        <span *ngIf="loading()" class="loading-text">
          <span class="spin-dot"></span>
          Authenticating...
        </span>
        <svg *ngIf="!loading()" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7h10M8 3l4 4-4 4" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="login-footer">
      Hexagon SDx · Venture Global LNG · v2.0
    </div>
  </div>
</div>
