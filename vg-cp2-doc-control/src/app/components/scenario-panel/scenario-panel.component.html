<aside class="sdx-sidebar">
  <!-- Pie chart / summary area -->
  <div class="sidebar-summary">
    <div class="pie-chart">
      <svg viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" fill="none" stroke="#e0e0e0" stroke-width="12"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke="#22c55e" stroke-width="12"
          stroke-dasharray="214" [attr.stroke-dashoffset]="214 - (stats.pass / (stats.total || 1)) * 214"
          transform="rotate(-90 40 40)" stroke-linecap="round"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke="#ef4444" stroke-width="12"
          [attr.stroke-dasharray]="(stats.fail / (stats.total || 1)) * 214 + ' ' + 214"
          [attr.stroke-dashoffset]="-(stats.pass / (stats.total || 1)) * 214"
          transform="rotate(-90 40 40)"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke="#f59e0b" stroke-width="12"
          [attr.stroke-dasharray]="(stats.review / (stats.total || 1)) * 214 + ' ' + 214"
          [attr.stroke-dashoffset]="-((stats.pass + stats.fail) / (stats.total || 1)) * 214"
          transform="rotate(-90 40 40)"/>
        <text x="40" y="38" text-anchor="middle" fill="#333" font-size="16" font-weight="700">{{ stats.total }}</text>
        <text x="40" y="50" text-anchor="middle" fill="#888" font-size="8">TOTAL</text>
      </svg>
    </div>
    <div class="sidebar-filter-label">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 2h10L7 6.5V10l-2-1V6.5L1 2z" fill="#666"/>
      </svg>
      <span>{{ stats.total }} selected</span>
    </div>
  </div>

  <!-- Filter categories (SDx style) -->
  <div class="filter-section">
    <div class="filter-group">
      <label class="filter-row" *ngFor="let sc of scenarios"
        [class.active]="selectedScenario === sc.id"
        (click)="onSelect(sc.id)">
        <span class="filter-icon">
          <svg *ngIf="sc.id === 'valid'" width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="#22c55e" stroke-width="1.5"/><path d="M4.5 7l2 2 3-4" stroke="#22c55e" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
          <svg *ngIf="sc.id === 'invalid'" width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="#ef4444" stroke-width="1.5"/><path d="M5 5l4 4M9 5l-4 4" stroke="#ef4444" stroke-width="1.3" stroke-linecap="round"/></svg>
          <svg *ngIf="sc.id === 'bulk'" width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="10" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/><path d="M4 7h6M7 4v6" stroke="#3b82f6" stroke-width="1.3" stroke-linecap="round"/></svg>
        </span>
        <span class="filter-label">{{ sc.label }}</span>
        <span class="filter-badge" [ngClass]="sc.id">{{ sc.docCount }}</span>
      </label>
    </div>
  </div>

  <!-- Workflow categories (SDx style) -->
  <div class="filter-section">
    <div class="filter-heading">Workflow Steps</div>
    <div class="filter-group">
      <label class="filter-row sub">
        <span class="filter-label">Actions</span>
      </label>
      <label class="filter-row sub">
        <span class="filter-label">Approval</span>
      </label>
      <label class="filter-row sub">
        <span class="filter-label">Overdue</span>
      </label>
      <label class="filter-row sub">
        <span class="filter-label">Target Date</span>
      </label>
      <label class="filter-row sub">
        <span class="filter-label">Priority</span>
      </label>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-heading">Relationships</div>
    <div class="filter-group">
      <label class="filter-row sub">
        <span class="filter-label">Show Assigned Tasks ({{ stats.total }})</span>
      </label>
      <label class="filter-row sub">
        <span class="filter-label">Show Reassign Steps (0)</span>
      </label>
      <label class="filter-row sub">
        <span class="filter-label">Show Revision Steps (0)</span>
      </label>
    </div>
  </div>

  <!-- Run button -->
  <div class="sidebar-run">
    <button
      class="run-btn"
      [class.running]="isRunning"
      [disabled]="isRunning || !selectedScenario"
      (click)="onRun()"
    >
      <svg *ngIf="!isRunning" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M3 1.5l7.5 4.5L3 10.5V1.5z" fill="white"/>
      </svg>
      <span class="spin-sm" *ngIf="isRunning"></span>
      {{ runBtnLabel }}
    </button>
  </div>

  <!-- Session stats -->
  <div class="sidebar-stats">
    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-num pass">{{ stats.pass }}</span>
        <span class="stat-lbl">Accepted</span>
      </div>
      <div class="stat-item">
        <span class="stat-num fail">{{ stats.fail }}</span>
        <span class="stat-lbl">Rejected</span>
      </div>
      <div class="stat-item">
        <span class="stat-num review">{{ stats.review }}</span>
        <span class="stat-lbl">Review</span>
      </div>
    </div>
  </div>
</aside>
